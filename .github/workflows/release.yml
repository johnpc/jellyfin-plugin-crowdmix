name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 9.0.x

    - name: Restore dependencies
      run: dotnet restore jellyfin-plugin-crowdmix.sln

    - name: Check formatting
      run: dotnet format jellyfin-plugin-crowdmix.sln --verify-no-changes

    - name: Build (strict)
      run: dotnet build jellyfin-plugin-crowdmix.sln --configuration Release --no-restore /p:TreatWarningsAsErrors=true

    - name: Run unit tests with coverage
      run: |
        dotnet test Jellyfin.Plugin.CrowdMix.Tests/Jellyfin.Plugin.CrowdMix.Tests.csproj \
          --configuration Release \
          --no-build \
          /p:CollectCoverage=true \
          /p:CoverletOutputFormat=json \
          /p:CoverletOutput=../coverage/coverage.json \
          /p:Include="[Jellyfin.Plugin.CrowdMix]*" \
          /p:ThresholdType=line \
          /p:Threshold=80

    - name: Run acceptance tests
      run: |
        dotnet test Jellyfin.Plugin.CrowdMix.AcceptanceTests/Jellyfin.Plugin.CrowdMix.AcceptanceTests.csproj \
          --configuration Release \
          --no-build

    - name: CRAP score check
      run: bash scripts/check-crap.sh coverage/coverage.json

    - name: Line count check
      run: bash scripts/check-line-count.sh 250

  release:
    runs-on: ubuntu-latest
    needs: validate

    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Get next version
      id: get_version
      run: |
        LATEST=$(git tag --sort=-v:refname | head -1 | sed 's/^v//')
        if [ -z "$LATEST" ]; then
          LATEST="0.0.0.0"
        fi
        NEXT=$(echo "$LATEST" | awk -F. '{$NF=$NF+1; print}' OFS=.)
        echo "VERSION=$NEXT" >> $GITHUB_OUTPUT
        echo "Next version: $NEXT"

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 9.0.x

    - name: Restore dependencies
      run: dotnet restore Jellyfin.Plugin.CrowdMix/Jellyfin.Plugin.CrowdMix.csproj

    - name: Build release
      run: |
        VERSION=${{ steps.get_version.outputs.VERSION }}
        dotnet build Jellyfin.Plugin.CrowdMix/Jellyfin.Plugin.CrowdMix.csproj --configuration Release --no-restore \
          /p:TreatWarningsAsErrors=true \
          /p:Version=$VERSION \
          /p:AssemblyVersion=$VERSION \
          /p:FileVersion=$VERSION

    - name: Create release zip
      run: |
        VERSION=${{ steps.get_version.outputs.VERSION }}
        mkdir -p release
        find Jellyfin.Plugin.CrowdMix -path "*/bin/Release/net9.0/*.dll" -exec cp {} release/ \;
        cd release
        zip -r ../jellyfin-plugin-crowdmix-${VERSION}.zip .

    - name: Calculate checksum
      id: calculate_checksum
      run: |
        VERSION=${{ steps.get_version.outputs.VERSION }}
        CHECKSUM=$(md5sum jellyfin-plugin-crowdmix-${VERSION}.zip | awk '{ print $1 }')
        echo "CHECKSUM=$CHECKSUM" >> $GITHUB_OUTPUT

    - name: Generate manifest.json
      run: |
        VERSION=${{ steps.get_version.outputs.VERSION }}
        CHECKSUM=${{ steps.calculate_checksum.outputs.CHECKSUM }}
        TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        cat > manifest.json << EOF
        [
          {
            "guid": "fd98574b-53f4-473d-81e1-ca86cce168bd",
            "name": "CrowdMix",
            "overview": "A better Instant Mix powered by real listening-crowd similarity (Last.fm), not just audio.",
            "description": "CrowdMix replaces Jellyfin's native Instant Mix with recommendations sourced from a real listening population via the Last.fm API. It matches local tracks to the catalog, pulls similar tracks and artists, intersects with owned music, and re-ranks by your Jellyfin play history and tag overlap. Unmatched tracks fall back to the native mix.",
            "owner": "johnpc",
            "category": "General",
            "versions": [
              {
                "version": "${VERSION}",
                "changelog": "See the full changelog at [GitHub](https://github.com/johnpc/jellyfin-plugin-crowdmix/releases/tag/${VERSION})",
                "targetAbi": "10.11.0.0",
                "sourceUrl": "https://github.com/johnpc/jellyfin-plugin-crowdmix/releases/download/${VERSION}/jellyfin-plugin-crowdmix-${VERSION}.zip",
                "checksum": "${CHECKSUM}",
                "timestamp": "${TIMESTAMP}"
              }
            ]
          }
        ]
        EOF

    - name: Create tag and GitHub Release
      run: |
        VERSION=${{ steps.get_version.outputs.VERSION }}
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag "$VERSION"
        git push origin "$VERSION"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.get_version.outputs.VERSION }}
        files: |
          jellyfin-plugin-crowdmix-${{ steps.get_version.outputs.VERSION }}.zip
          manifest.json
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Update manifest on main
      run: |
        git fetch origin main
        git checkout main
        git add manifest.json
        git commit -m "chore: update manifest for ${{ steps.get_version.outputs.VERSION }}" || true
        git push origin main
